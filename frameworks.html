<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Agent Frameworks — Agent Skills Leaderboard</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <style>html{background:#0d1117}html[data-theme="light"]{background:#f6f8fa}</style>
  <script>(function(){var t=localStorage.getItem('st_theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();</script>
  <link rel="stylesheet" href="shared.css" />
</head>
<body>

<!-- ── Page loader / skeleton ── -->
<div id="pageLoader">
  <div class="skel-navbar">
    <div class="skel skel-navbar-logo"></div>
    <div class="skel-navbar-right">
      <div class="skel skel-navbar-btn"></div>
      <div class="skel skel-navbar-btn"></div>
      <div class="skel skel-navbar-btn"></div>
    </div>
  </div>
  <div class="skel-hero">
    <div class="skel skel-hero-title"></div>
    <div class="skel skel-hero-sub"></div>
    <div class="skel-pills">
      <div class="skel skel-pill"></div>
      <div class="skel skel-pill"></div>
      <div class="skel skel-pill"></div>
      <div class="skel skel-pill"></div>
    </div>
  </div>
  <div class="skel-grid">
    <div class="skel skel-card"></div><div class="skel skel-card"></div>
    <div class="skel skel-card"></div><div class="skel skel-card"></div>
    <div class="skel skel-card"></div><div class="skel skel-card"></div>
    <div class="skel skel-card"></div><div class="skel skel-card"></div>
    <div class="skel skel-card"></div>
  </div>
</div>

<!-- ── Navbar ── -->
<nav class="navbar" id="navbar"></nav>

<!-- ── Hero ── -->
<div class="hero" id="hero"></div>

<div class="container">

  <!-- No data warning -->
  <div id="noData" class="no-data" style="display:none">
    ⚠️ <code>frameworks_data.js</code> not found. Run:
    <code>python3 fetch_frameworks.py</code>
    then serve with <code>python3 -m http.server 8080</code> and open
    <a href="http://localhost:8080">localhost:8080</a>.
  </div>

  <!-- Category tabs -->
  <div class="tabs" id="tabs"></div>

  <!-- Filter bar -->
  <div id="filterBar"></div>

  <!-- Active filters -->
  <div class="active-filters hidden" id="activeFilters"></div>

  <!-- Use-case chips -->
  <div class="uc-scroller" id="ucScroller"></div>

  <!-- Grid -->
  <div class="grid" id="grid"></div>

  <!-- List table -->
  <table class="list-table" id="listTable" style="display:none"></table>

  <!-- Pagination -->
  <div class="pagination" id="pagination"></div>

  <!-- Visit counter -->
  <div class="visit-badge" id="visitBadge"></div>

</div>

<div class="footer">
  Data sourced from <a href="https://docs.github.com/en/rest/search" target="_blank">GitHub Search API</a> · Updated weekly ·
  <a href="#" id="ghFooterLink" target="_blank" rel="noopener noreferrer">GitHub</a>
</div>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    const el = document.getElementById('ghFooterLink');
    if (el && typeof GITHUB_REPO !== 'undefined') el.href = GITHUB_REPO;
  });
</script>

<script src="frameworks_data.js?v=20260518"></script>
<script src="shared.js"></script>
<script>
  window.addEventListener('DOMContentLoaded', () => {
    init({
      page:       'frameworks',
      dataKey:    'FRAMEWORKS_DATA',
      noDataHint: 'Run python3 fetch_frameworks.py to generate data, then refresh.',
    });
  });
</script>
</body>
</html>
