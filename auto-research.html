<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Auto Research — Agent Skills Leaderboard</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="shared.css" />
  <script>(function(){var t=localStorage.getItem('st_theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();</script>
</head>
<body>

<!-- ── Page loader ── -->
<div id="pageLoader">
  <div class="loader-ring"></div>
  <span class="loader-label">Loading…</span>
</div>

<!-- ── Navbar ── -->
<nav class="navbar" id="navbar"></nav>

<!-- ── Hero ── -->
<div class="hero" id="hero"></div>

<div class="container">

  <!-- No data warning -->
  <div id="noData" class="no-data" style="display:none">
    ⚠️ <code>auto_research_data.js</code> not found. Run:
    <code>python3 fetch_auto_research.py</code>
    then serve with <code>python3 -m http.server 8080</code> and open
    <a href="http://localhost:8080">localhost:8080</a>.
  </div>

  <!-- Category tabs -->
  <div class="tabs" id="tabs"></div>

  <!-- Filter bar (rendered by shared.js via renderFilterBar) -->
  <div id="filterBar"></div>

  <!-- Active filters -->
  <div class="active-filters hidden" id="activeFilters"></div>

  <!-- Use-case chips -->
  <div class="uc-scroller" id="ucScroller"></div>

  <!-- Grid -->
  <div class="grid" id="grid"></div>

  <!-- List table -->
  <table class="list-table" id="listTable" style="display:none"></table>

  <!-- Pagination -->
  <div class="pagination" id="pagination"></div>

  <!-- Visit counter -->
  <div class="visit-badge" id="visitBadge">
    <a href='https://www.counters-free.net/'>counters-free</a>
    <script type='text/javascript' src='https://www.freevisitorcounters.com/auth.php?id=98df7b5e688e62c996e7d446f3a8b7d8fb4e89c5'></script>
    <script type="text/javascript" src="https://www.freevisitorcounters.com/en/home/counter/1554257/t/5"></script>
  </div>

</div>

<div class="footer">
  Data sourced from <a href="https://docs.github.com/en/rest/search" target="_blank">GitHub Search API</a> · Updated weekly ·
  <a href="#" id="ghFooterLink" target="_blank" rel="noopener noreferrer">GitHub</a>
</div>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    const el = document.getElementById('ghFooterLink');
    if (el && typeof GITHUB_REPO !== 'undefined') el.href = GITHUB_REPO;
  });
</script>

<script src="auto_research_data.js"></script>
<script src="shared.js"></script>
<script>
  window.addEventListener('DOMContentLoaded', () => {
    init({
      page:       'research',
      dataKey:    'AR_DATA',
      noDataHint: 'Run python3 fetch_auto_research.py to generate data, then refresh.',
    });
  });
</script>
</body>
</html>
