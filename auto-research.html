<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Auto Research — Agent Skills Leaderboard</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="shared.css" />
</head>
<body>

<!-- ── Navbar ── -->
<nav class="navbar" id="navbar"></nav>

<!-- ── Hero ── -->
<div class="hero" id="hero"></div>

<div class="container">

  <!-- No data warning -->
  <div id="noData" class="no-data" style="display:none">
    ⚠️ <code>auto_research_data.js</code> not found. Run:
    <code>python3 fetch_auto_research.py</code>
    then serve with <code>python3 -m http.server 8080</code> and open
    <a href="http://localhost:8080">localhost:8080</a>.
  </div>

  <!-- Category tabs -->
  <div class="tabs" id="tabs"></div>

  <!-- Filter bar (rendered by shared.js via renderFilterBar) -->
  <div id="filterBar"></div>

  <!-- Active filters -->
  <div class="active-filters hidden" id="activeFilters"></div>

  <!-- Use-case chips -->
  <div class="uc-scroller" id="ucScroller"></div>

  <!-- Grid -->
  <div class="grid" id="grid"></div>

  <!-- List table -->
  <table class="list-table" id="listTable" style="display:none"></table>

  <!-- Pagination -->
  <div class="pagination" id="pagination"></div>

</div>

<div class="footer">
  Data sourced from <a href="https://docs.github.com/en/rest/search" target="_blank">GitHub Search API</a> · Updated weekly
</div>

<script src="auto_research_data.js"></script>
<script src="shared.js"></script>
<script>
  window.addEventListener('DOMContentLoaded', () => {
    init({
      page:       'research',
      dataKey:    'AR_DATA',
      noDataHint: 'Run python3 fetch_auto_research.py to generate data, then refresh.',
    });
  });
</script>
</body>
</html>
