name: Weekly Data Update

on:
  schedule:
    - cron: '0 2 * * 1'   # Every Monday at 02:00 UTC
  workflow_dispatch:        # Allow manual trigger from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # Required to push data.js back to repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch Skills data
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          if [ -n "$GH_TOKEN" ]; then
            python3 fetch_data.py --token "$GH_TOKEN"
          else
            python3 fetch_data.py
          fi

      - name: Fetch Auto Research data
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          if [ -n "$GH_TOKEN" ]; then
            python3 fetch_auto_research.py --token "$GH_TOKEN"
          else
            python3 fetch_auto_research.py
          fi

      - name: Commit and push if data changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json data.js auto_research_data.json auto_research_data.js
          if git diff --cached --quiet; then
            echo "No changes — skipping commit"
          else
            TOTAL_SKILLS=$(python3 -c "import json; print(json.load(open('data.json'))['meta']['total'])")
            TOTAL_RESEARCH=$(python3 -c "import json; print(json.load(open('auto_research_data.json'))['meta']['total'])")
            git commit -m "chore: weekly data update [skills=${TOTAL_SKILLS}, research=${TOTAL_RESEARCH}]"
            git push
          fi
