name: Update Skills (Monday)

on:
  schedule:
    - cron: '0 2 * * 1'   # Monday 02:00 UTC
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch Skills data
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python3 scripts/fetch_data.py

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/data.json data/data.js index.html
          if git diff --cached --quiet; then
            echo "No changes"
          else
            N=$(python3 -c "import json; print(json.load(open('data/data.json'))['meta']['total'])")
            git commit -m "chore: update skills data [total=${N}]"
            git push
          fi
