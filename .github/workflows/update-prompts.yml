name: Update Prompts (Thursday)

on:
  schedule:
    - cron: '0 2 * * 4'   # Thursday 02:00 UTC
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch Prompts data
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python3 fetch_prompts.py

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add prompts_data.json prompts_data.js prompts.html
          if git diff --cached --quiet; then
            echo "No changes"
          else
            N=$(python3 -c "import json; print(json.load(open('prompts_data.json'))['meta']['total'])")
            git commit -m "chore: update prompts data [total=${N}]"
            git push
          fi
