name: Daily Data Update

on:
  schedule:
    - cron: '0 2 * * *'   # Every day 02:00 UTC
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch all data
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 scripts/fetch_data.py
          python3 scripts/fetch_frameworks.py
          python3 scripts/fetch_mcp.py
          python3 scripts/fetch_prompts.py
          python3 scripts/fetch_auto_research.py

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/data.json data/data.js \
                  data/auto_research_data.json data/auto_research_data.js \
                  data/mcp_data.json data/mcp_data.js \
                  data/prompts_data.json data/prompts_data.js \
                  data/frameworks_data.json data/frameworks_data.js \
                  index.html
          if git diff --cached --quiet; then
            echo "No changes — skipping commit"
          else
            DATE=$(date -u +%Y-%m-%d)
            git commit -m "chore: daily incremental update ${DATE}"
            git push
          fi
